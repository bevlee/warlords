          { id:&#x27;dem-opening&#x27;, tier:3, name:&quot;Devil&#x27;s Opening&quot;, max:1, cost:2, effect:&#x27;The first attack against a Burning target each round prevents retaliation.&#x27;, why:&#x27;Turns Burn into an attack-order puzzle.&#x27;, need:[[&#x27;dem-cruelty&#x27;,2]], branchSpend:4 },
          { id:&#x27;dem-inferno&#x27;, tier:4, name:&#x27;Inferno Chain&#x27;, max:1, cost:3, effect:&#x27;A kill makes adjacent enemies Burn and advances the killer 10% ATB once per round.&#x27;, why:&#x27;A clustered payoff the opponent can mitigate with spacing.&#x27;, need:[[&#x27;dem-cruelty&#x27;,3],[&#x27;dem-opening&#x27;,1]], branchSpend:7, cap:true }
        ]},
        { name: &#x27;Gatekeeper&#x27;, role: &#x27;Gating · spell tempo&#x27;, tags:[&#x27;economy&#x27;,&#x27;magic&#x27;], nodes: [
          { id:&#x27;dem-gatemastery&#x27;, tier:1, name:&#x27;Gate Mastery&#x27;, max:3, cost:1, effect:&#x27;+10 percentage points Gating chance per rank.&#x27;, why:&#x27;Supports the faction identity without improving every hit.&#x27;, need:[] },

          { id:&#x27;dem-haste&#x27;, tier:2, name:&#x27;Haste Ritual&#x27;, max:1, cost:2, effect:&#x27;Pit Fiend Haste also advances its target 8% ATB.&#x27;, why:&#x27;Makes support timing more important than a flat initiative buff.&#x27;, need:[[&#x27;dem-gatemastery&#x27;,1]] },

  const select = root.querySelector(&#x27;#wtp-faction&#x27;);
  const levelInput = root.querySelector(&#x27;#wtp-level&#x27;);
  const levelValue = root.querySelector(&#x27;#wtp-level-value&#x27;);
  const pointsEl = root.querySelector(&#x27;#wtp-points&#x27;);
  const meterEl = root.querySelector(&#x27;#wtp-meter&#x27;);
  const summaryEl = root.querySelector(&#x27;#wtp-faction-summary&#x27;);
  const treesEl = root.querySelector(&#x27;#wtp-trees&#x27;);
  const detailEl = root.querySelector(&#x27;#wtp-detail&#x27;);
  let factionId = &#x27;wizard&#x27;;
  let ranks = {};
  let selectedId = &#x27;wiz-channel&#x27;;

  Object.entries(factions).forEach(([id, faction]) =&gt; {
    const option = document.createElement(&#x27;option&#x27;);
    option.value = id;
    option.textContent = `${faction.glyph} ${faction.name}`;
    option.selected = id === factionId;
    select.appendChild(option);
  });

  const faction = () =&gt; factions[factionId];
  const nodes = () =&gt; faction().branches.flatMap(branch =&gt; branch.nodes);
  const nodeById = id =&gt; nodes().find(node =&gt; node.id === id);
  const branchFor = id =&gt; faction().branches.find(branch =&gt; branch.nodes.some(node =&gt; node.id === id));
  const spent = () =&gt; nodes().reduce((sum, node) =&gt; sum + (ranks[node.id] || 0) * node.cost, 0);
  const spentIn = branch =&gt; branch.nodes.reduce((sum, node) =&gt; sum + (ranks[node.id] || 0) * node.cost, 0);
  const affinityFor = branch =&gt; (spentIn(branch) &gt;= 7 ? 2 : spentIn(branch) &gt;= 3 ? 1 : 0);
  const hasOtherCap = node =&gt; node.cap &amp;&amp; nodes().some(other =&gt; other.cap &amp;&amp; other.id !== node.id &amp;&amp; (ranks[other.id] || 0) &gt; 0);
  const requirementsMet = node =&gt; {
    if (hasOtherCap(node)) return false;
    if ((node.need || []).some(([id, rank]) =&gt; (ranks[id] || 0) &lt; rank)) return false;
    if (node.branchSpend &amp;&amp; spentIn(branchFor(node.id)) &lt; node.branchSpend) return false;
    return true;
  };
  const dependents = id =&gt; nodes().filter(node =&gt; (ranks[node.id] || 0) &gt; 0 &amp;&amp; (node.need || []).some(([needId]) =&gt; needId === id));
  const canRefund = node =&gt; (ranks[node.id] || 0) &gt; 0 &amp;&amp; dependents(node.id).length === 0;
  const canInvest = node =&gt; (ranks[node.id] || 0) &lt; node.max &amp;&amp; requirementsMet(node) &amp;&amp; spent() + node.cost &lt;= budget;

  function reqText(node) {
    const bits = [];
    (node.need || []).forEach(([id, rank]) =&gt; bits.push(`${nodeById(id).name} ${rank}/${nodeById(id).max}`));
    if (node.branchSpend) bits.push(`${node.branchSpend} points in ${branchFor(node.id).name}`);
    if (node.cap) bits.push(&#x27;no other capstone&#x27;);
    return bits.length ? `Requires ${bits.join(&#x27; · &#x27;)}` : &#x27;No prerequisite&#x27;;
  }

  function render() {
    const f = faction();
    const used = spent();
    const available = budget - used;
    pointsEl.textContent = available &gt;= 0 ? `${available} available · ${used} spent` : `${Math.abs(available)} over budget · ${used} spent`;
    pointsEl.className = available &lt; 0 ? &#x27;text-destructive&#x27; : &#x27;&#x27;;
    meterEl.style.width = `${Math.min(100, (used / budget) * 100)}%`;
    const biases = f.branches.flatMap(branch =&gt; branch.tags.map(tag =&gt; [tag, affinityFor(branch)])).filter(([, value]) =&gt; value &gt; 0);
    const biasText = biases.length ? `Draft affinity: ${biases.map(([tag, value]) =&gt; `${tag} +${value}`).join(&#x27; · &#x27;)}` : &#x27;Draft affinity: none yet — reach 3 points in a branch&#x27;;
    summaryEl.innerHTML = `&lt;strong&gt;${f.glyph} ${f.name}&lt;/strong&gt;&lt;span class=&quot;text-muted&quot;&gt;${f.identity}&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;${biasText}&lt;/span&gt;`;
    treesEl.innerHTML = &#x27;&#x27;;

    f.branches.forEach((branch, branchIndex) =&gt; {
      const section = document.createElement(&#x27;section&#x27;);
      section.className = &#x27;branch&#x27;;
      section.setAttribute(&#x27;aria-label&#x27;, branch.name);
      section.innerHTML = `&lt;div class=&quot;branch-head&quot;&gt;&lt;span class=&quot;branch-mark&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;h3&gt;${branch.name}&lt;/h3&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;${branch.role} · ${spentIn(branch)} points&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;branch-tree&quot;&gt;&lt;/div&gt;`;
      const tree = section.querySelector(&#x27;.branch-tree&#x27;);
      [1,2,3,4].forEach(tier =&gt; {
        const tierNodes = branch.nodes.filter(node =&gt; node.tier === tier);
        const row = document.createElement(&#x27;div&#x27;);
        row.className = `tier${tierNodes.length &gt; 1 ? &#x27; split&#x27; : &#x27;&#x27;}`;
        tierNodes.forEach(node =&gt; {
          const current = ranks[node.id] || 0;
          const unlocked = requirementsMet(node) || current &gt; 0;
          const wrap = document.createElement(&#x27;div&#x27;);
          wrap.className = `node-wrap${current ? &#x27; purchased&#x27; : &#x27;&#x27;}`;
          const button = document.createElement(&#x27;button&#x27;);
          button.type = &#x27;button&#x27;;
          button.className = `btn btn-block${selectedId === node.id ? &#x27; is-selected&#x27; : &#x27;&#x27;}`;
          button.disabled = !unlocked &amp;&amp; current === 0;
          button.setAttribute(&#x27;aria-pressed&#x27;, selectedId === node.id ? &#x27;true&#x27; : &#x27;false&#x27;);
          button.setAttribute(&#x27;aria-label&#x27;, `${node.name}, rank ${current} of ${node.max}, ${node.cost} point${node.cost === 1 ? &#x27;&#x27; : &#x27;s&#x27;} per rank`);
          button.innerHTML = `&lt;span class=&quot;node-line&quot;&gt;&lt;span class=&quot;node-name&quot;&gt;${node.cap ? &#x27;◆ &#x27; : tier === 1 ? &#x27;● &#x27; : &#x27;◇ &#x27;}${node.name}&lt;/span&gt;&lt;span class=&quot;rank&quot;&gt;${current}/${node.max} · ${node.cost}p&lt;/span&gt;&lt;/span&gt;`;
          button.addEventListener(&#x27;click&#x27;, () =&gt; { selectedId = node.id; render(); });
          wrap.appendChild(button);
          row.appendChild(wrap);
        });
        tree.appendChild(row);
      });
      treesEl.appendChild(section);
    });

    const selected = nodeById(selectedId) || nodes()[0];
    selectedId = selected.id;
    const current = ranks[selected.id] || 0;
    const lockedReason = !requirementsMet(selected) &amp;&amp; current === 0 ? reqText(selected) : &#x27;&#x27;;
    detailEl.innerHTML = `&lt;div class=&quot;detail-copy&quot;&gt;&lt;div class=&quot;viz-row&quot;&gt;&lt;h3&gt;${selected.cap ? &#x27;Capstone · &#x27; : &#x27;&#x27;}${selected.name}&lt;/h3&gt;&lt;span class=&quot;viz-badge&quot;&gt;${branchFor(selected.id).name}&lt;/span&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;Rank ${current}/${selected.max} · ${selected.cost} point${selected.cost === 1 ? &#x27;&#x27; : &#x27;s&#x27;}&lt;/span&gt;&lt;/div&gt;&lt;p class=&quot;effect-line&quot;&gt;${selected.effect}&lt;/p&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;${selected.why}&lt;/p&gt;&lt;p class=&quot;text-small ${lockedReason ? &#x27;text-destructive&#x27; : &#x27;text-muted&#x27;}&quot;&gt;${lockedReason || reqText(selected)}&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;detail-actions&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;wtp-refund&quot; ${canRefund(selected) ? &#x27;&#x27; : &#x27;disabled&#x27;}&gt;Refund&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;wtp-invest&quot; ${canInvest(selected) ? &#x27;&#x27; : &#x27;disabled&#x27;}&gt;Invest ${selected.cost}p&lt;/button&gt;&lt;/div&gt;`;
    detailEl.querySelector(&#x27;#wtp-invest&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
      if (!canInvest(selected)) return;
      ranks[selected.id] = current + 1;
      render();
    });
    detailEl.querySelector(&#x27;#wtp-refund&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
      if (!canRefund(selected)) return;
      ranks[selected.id] = current - 1;
      render();
    });
  }

  select.addEventListener(&#x27;change&#x27;, event =&gt; {
    factionId = event.target.value;
    ranks = {};
    selectedId = factions[factionId].branches[0].nodes[0].id;
    render();
  });

  levelInput.addEventListener(&#x27;input&#x27;, event =&gt; {
    budget = Number(event.target.value);
    levelValue.textContent = String(budget);
    render();
  });

  render();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };

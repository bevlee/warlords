server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed assets — the filename changes whenever the bytes do,
    # so these can never go stale. Cache them permanently.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # version.json is how SvelteKit detects a new deploy — it must never be
    # cached, or clients keep believing they are up to date.
    location = /_app/version.json {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: real file, then directory, then index.html so client-side
    # routing owns unknown paths. This is what adapter-static's
    # `fallback: 'index.html'` expects the server to do.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}